services:
  fastapi_app:
    build: .
    container_name: fastapi_app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54320/FastapiDB
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn auth.main:app --host 0.0.0.0 --port 8000 --reload